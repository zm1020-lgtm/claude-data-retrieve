name: Daily Whale Briefing

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scan-and-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Diagnose API connectivity
        run: |
          echo "=== Testing Hyperliquid API reachability ==="
          curl -s -o /tmp/lb_test.txt -w "HTTP %{http_code}" \
            "https://stats-data.hyperliquid.xyz/Mainnet/leaderboard" || true
          echo ""
          echo "Leaderboard response (first 300 chars):"
          head -c 300 /tmp/lb_test.txt || true
          echo ""
          echo "=== Testing info API ==="
          curl -s -o /tmp/info_test.txt -w "HTTP %{http_code}" \
            -X POST https://api.hyperliquid.xyz/info \
            -H "Content-Type: application/json" \
            -d '{"type":"meta"}' || true
          echo ""
          echo "Info API response (first 300 chars):"
          head -c 300 /tmp/info_test.txt || true

      - name: Run whale scanner
        run: |
          set +e
          python3 scripts/whale_scanner.py both 50 > /tmp/whale_data.json 2> /tmp/scanner.log
          EXIT=$?
          echo "=== Scanner stderr log ==="
          cat /tmp/scanner.log
          echo "=== Exit code: $EXIT ==="
          echo "=== JSON size: $(wc -c < /tmp/whale_data.json) bytes ==="
          echo "=== First 200 chars of JSON (should start with '{') ==="
          head -c 200 /tmp/whale_data.json
          echo ""
          if [ $EXIT -ne 0 ]; then exit 1; fi
          python3 -c "import json; d = json.load(open('/tmp/whale_data.json')); print(f\"Top wallets: {len(d['top_traders']['wallets'])}, Rekt wallets: {len(d['rekt_traders']['wallets'])}\")"

      - name: Generate briefing
        run: python3 scripts/generate_briefing.py

      - name: Show briefing
        run: cat briefings/whale-briefing-$(date +%Y-%m-%d).md

      - name: Commit and push briefing
        run: |
          git config user.email "whale-bot@github-actions"
          git config user.name "Whale Briefing Bot"
          DATE=$(date +%Y-%m-%d)
          git add briefings/
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "Daily whale briefing $DATE [automated]"
          git push origin main

      - name: Send email
        if: vars.SEND_EMAIL == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🐋 Hyperliquid Whale Briefing — ${{ env.DATE }}"
          to: ${{ secrets.MAIL_TO }}
          from: "Whale Bot <${{ secrets.MAIL_USERNAME }}>"
          body: file://briefings/whale-briefing-${{ env.DATE }}.md
          content_type: text/plain
